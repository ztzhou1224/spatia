min_confidence = 0.8

[[tests]]
name = "edge_cache_upsert"
description = "Cache upserts overwrite previous values"
tags = ["cache", "edge_case"]
addresses = ["test addr"]
seed_cache = true
cache_seeds = [
    { address = "test addr", lat = 11.0, lon = 21.0, source = "geocodio" }
]
[[tests.expect]]
