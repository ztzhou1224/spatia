seed_cache = true
cache_seeds = [
    { address = "85 Pike St, Seattle, WA 98101", lat = 47.6088, lon = -122.3404 },
    { address = "400 Broad St, Seattle, WA 98109", lat = 47.6205, lon = -122.3493 }
]
expect_geocoded_count = 2
