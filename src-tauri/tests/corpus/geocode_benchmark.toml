# ============================================================
# Cache tests: Pre-seeded cache hits, validate exact coordinates
# ============================================================

[[tests]]
name = "cache_pike_place"
description = "Cache hit for Pike Place Market"
tags = ["cache"]
addresses = ["85 Pike St, Seattle, WA 98101"]
seed_cache = true
cache_seeds = [
    { address = "85 Pike St, Seattle, WA 98101", lat = 47.6088, lon = -122.3404, source = "geocodio" }
]
[[tests.expect]]
address = "85 Pike St, Seattle, WA 98101"
lat = 47.6088
lon = -122.3404
max_distance_meters = 10.0
expect_source = "cache"
min_confidence = 0.8

