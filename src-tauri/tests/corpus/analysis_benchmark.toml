# ══════════════════════════════════════════════════════════════════════════════
# Multi-turn / conversational context (R6)
# ══════════════════════════════════════════════════════════════════════════════

[[tests]]
name = "context_followup_filter"
description = "Follow-up question that refines previous result"
setup_csv = "../../../data/seattle_coffee_shops.csv"
setup_table = "coffee_shops"
query = "Now show me only the ones with wifi."
expect_sql_contains = ["WHERE"]
expect_min_rows = 1
tags = ["conversational", "filter"]
[[tests.conversation_history]]
role = "user"
content = "Show me coffee shops with a rating above 4.0"
[[tests.conversation_history]]
role = "assistant"
content = "Here are the coffee shops with a rating above 4.0."

[[tests]]
name = "context_drill_down"
description = "Drill-down from aggregate to detail"
setup_csv = "../../../data/wa_ev_registrations.csv"
setup_table = "ev_registrations"
query = "Show me the actual registrations for Tesla."
expect_sql_contains = ["WHERE"]
expect_min_rows = 1
tags = ["conversational", "filter", "ev"]
[[tests.conversation_history]]
role = "user"
content = "How many EV registrations per make?"
[[tests.conversation_history]]
role = "assistant"
content = "Here is the count of EV registrations by make. Tesla leads with the most registrations."

