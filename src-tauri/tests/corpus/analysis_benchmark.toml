# spatia_bench corpus — analysis pipeline end-to-end tests
# Run: cargo run -p spatia_bench -- --corpus tests/corpus/analysis_benchmark.toml
# Dry run: cargo run -p spatia_bench -- --dry-run --corpus tests/corpus/analysis_benchmark.toml
#
# CSV paths are relative to THIS file's directory.
# Assertion keys:
#   expect_sql_contains     — substrings that must appear in generated SQL
#   expect_sql_not_contains — substrings that must NOT appear
#   expect_row_count        — exact result row count
#   expect_min_rows         — minimum result row count
#   expect_columns          — columns that must exist in the result
#   expect_success          — default true; set false for expected failures
#   tags                    — for --tags filter

# ── Simple queries ────────────────────────────────────────────────────────────

[[tests]]
name = "count_all_rows"
description = "COUNT(*) on a full table"
setup_csv = "../../data/seattle_coffee_shops.csv"
setup_table = "coffee_shops"
query = "How many coffee shops are there in total?"
expect_sql_contains = ["COUNT"]
expect_row_count = 1
tags = ["simple", "aggregation"]

[[tests]]
name = "group_by_type"
description = "GROUP BY on a categorical column"
setup_csv = "../../data/seattle_coffee_shops.csv"
setup_table = "coffee_shops"
query = "How many coffee shops are there of each type?"
expect_sql_contains = ["GROUP BY", "COUNT"]
expect_min_rows = 2
tags = ["aggregation", "group_by"]

[[tests]]
name = "top5_by_reviews"
description = "ORDER BY + LIMIT for top-N"
setup_csv = "../../data/seattle_coffee_shops.csv"
setup_table = "coffee_shops"
query = "Show me the top 5 coffee shops by number of reviews."
expect_sql_contains = ["ORDER BY", "LIMIT"]
expect_row_count = 5
expect_columns = ["name"]
tags = ["simple", "filter", "limit"]

[[tests]]
name = "filter_high_rating"
description = "WHERE clause with numeric comparison"
setup_csv = "../../data/seattle_coffee_shops.csv"
setup_table = "coffee_shops"
query = "Which coffee shops have a rating above 4.5?"
expect_sql_contains = ["WHERE"]
expect_min_rows = 1
expect_columns = ["name"]
tags = ["filter", "numeric"]

[[tests]]
name = "average_rating_by_type"
description = "AVG aggregation grouped by category"
setup_csv = "../../data/seattle_coffee_shops.csv"
setup_table = "coffee_shops"
query = "What is the average rating for each type of coffee shop?"
expect_sql_contains = ["AVG", "GROUP BY"]
expect_min_rows = 1
tags = ["aggregation", "group_by"]

